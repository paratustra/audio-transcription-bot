name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # The test suite mocks Whisper and Twilio, so CI installs only the light
      # runtime + tooling — no torch/openai-whisper, keeping runs fast.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            Flask==3.1.3 python-dotenv==1.2.2 twilio==9.10.9 requests==2.34.2 \
            pytest==9.1.1 ruff==0.15.20

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Test
        run: pytest
